
[network_defaults]
all_interfaces_host = 0.0.0.0
loopback_host = 127.0.0.1
browser_access_host = localhost
loopback_ipv4_prefix = 127.
http_scheme = http

[ollama_service]
ipAddress = 127.0.0.1
port = 11434
api_path = /api/generate
model_name = deepseek-r1:1.5b
request_timeout = 120

[apache_ii_service]
ipAddress = 127.0.0.1
port = 5000

[analyzer_service]
ipAddress = 0.0.0.0
port = 6800
threaded = true
max_workers = 8

